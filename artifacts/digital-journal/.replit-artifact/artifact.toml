kind = "web"
previewPath = "/"
title = "Digital Journal Pro"
version = "1.0.0"
id = "artifacts/digital-journal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22816

[services.development]
run = "pnpm --filter @workspace/digital-journal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-journal", "run", "build" ]
publicDir = "artifacts/digital-journal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22816"
BASE_PATH = "/"
